<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="Golden-Alarm-Clock.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alarm Rotation | Tuxedo Cat Apps</title>
    <style>
    body {
        background-color: #0a0b1e; 
        color: #e0e0e0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        text-align: center;
    }
    .hero-img {
        width: 120px;
        height: 120px;
        margin-bottom: 20px;
    }
    h1 { 
        color: #ff4d4d; 
        font-weight: 800;
        font-size: 2.5em;
        letter-spacing: -1px;
        margin: 0;
    }
    p { 
        font-size: 1.2em;
        margin: 10px 0 30px 0;
        opacity: 0.9;
    }
    .store-badge {
        display: inline-block;
        margin: 10px 0 20px 0;
    }
    .store-badge img {
        height: 60px;
        width: auto;
    }
    .links {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 30px;
    }
    /* Button Style */
    .nav-btn { 
        color: #4d94ff; 
        text-decoration: none;
        border: 1px solid #4d94ff;
        padding: 10px 20px;
        border-radius: 8px;
        transition: all 0.3s ease;
        font-weight: 500;
    }
    .nav-btn:hover { 
        background-color: #4d94ff;
        color: white;
    }
    /* Text Link Style */
    .text-link {
        color: #e0e0e0;
        text-decoration: underline;
        opacity: 0.8;
        padding: 10px; /* Optional: adds a little touch area */
    }
    .text-link:hover {
        color: #4d94ff;
        opacity: 1;
    }
</style>
</head>
<body>
    <img src="Golden-Alarm-Clock.png" alt="Alarm Rotation Logo" class="hero-img">
    <h1>Alarm Rotation</h1>
    <p>Mindful wake-up routines.</p>

    <a href="https://play.google.com/store/apps/details?id=com.alarmrotation" class="store-badge" aria-label="Get it on Google Play">
        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
    </a>

    <div class="links">
        <a href="privacy.html" class="text-link">Privacy Policy</a>
        <a href="terms.html" class="text-link">Terms of Service</a>
        <a href="mailto:support@alarmrotation.com" class="text-link">support@alarmrotation.com</a>
    </div>
</body>
</html>
